<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ФЕРМА: Битва за врожай</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Landing-specific ── */
    .farm-scene-wrap {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .farm-scene {
      width: 100%;
      display: block;
    }
    .cloud1 { animation: cloudMove1 18s linear infinite; }
    .cloud2 { animation: cloudMove2 25s linear infinite; }
    .sun-glow { animation: sunPulse 3s ease-in-out infinite; }
    .wheat-sway { animation: sway 2s ease-in-out infinite alternate; transform-origin: bottom center; }
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    @keyframes cloudMove1 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(80px); }
    }
    @keyframes cloudMove2 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-60px); }
    }
    @keyframes sunPulse {
      0%, 100% { opacity: 0.5; r: 32; }
      50%       { opacity: 0.8; r: 40; }
    }
    @keyframes sway {
      0%   { transform: rotate(-3deg); }
      100% { transform: rotate(3deg); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>

            style="background:#2AABEE;color:#fff;font-size:15px;font-weight:700;padding:12px;border-radius:10px;border:none;cursor:pointer"
            onclick="doTelegramLogin()">
      <span style="font-size:18px">✈️</span> Увійти через Telegram
    </button>
  </div>

  <!-- Auth tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="showTab('login')">Увійти в гру</button>
    <button class="auth-tab" onclick="showTab('register')">Розпочати гру</button>
  </div>

  <!-- Login -->
  <div class="panel" id="login-panel">
    <div class="panel-header">🔑 Вхід до гри</div>
    <div class="panel-body">
      <div class="form-group">
        <label>Логін</label>
        <input type="text" id="login-username" placeholder="Ваш нікнейм" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="error-msg" id="login-error"></div>
      <button class="btn btn-blue btn-full" onclick="doLogin()">▶ Увійти</button>
    </div>
  </div>

  <!-- Register -->
  <div class="panel" id="register-panel" style="display:none">
    <div class="panel-header">⚔️ Нова гра</div>
    <div class="panel-body">
      <div class="form-group">
        <label>Нікнейм (3–20 символів)</label>
        <input type="text" id="reg-username" placeholder="Ваш нікнейм" maxlength="20">
      </div>
      <div class="form-group">
        <label>Пароль (мінімум 4 символи)</label>
        <input type="password" id="reg-password" placeholder="••••••••" minlength="4">
      </div>
      <div class="form-group">
        <label>Обери свою сторону</label>
        <div class="faction-choice">
          <label class="faction-btn elves" id="btn-elves">
            <input type="radio" name="faction" value="elves">
            <div class="faction-icon">🧝</div>
            <div>Ельфи</div>
            <div style="font-size:11px;opacity:0.8">Магія і хитрість</div>
          </label>
          <label class="faction-btn orcs" id="btn-orcs">
            <input type="radio" name="faction" value="orcs">
            <div class="faction-icon">👹</div>
            <div>Орки</div>
            <div style="font-size:11px;opacity:0.8">Сила і ярість</div>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Стать персонажа</label>
        <div class="gender-choice">
          <label class="gender-btn">
            <input type="radio" name="gender" value="male"> ♂ Чоловіча
          </label>
          <label class="gender-btn">
            <input type="radio" name="gender" value="female"> ♀ Жіноча
          </label>
        </div>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button class="btn btn-green btn-full" onclick="doRegister()">🌾 Розпочати гру!</button>
    </div>
  </div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  // Auto-auth if opened inside Telegram Mini App
  (async () => {
    if (window.Telegram?.WebApp?.initData) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      const r = await fetch('/api/auth/telegram-webapp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
      });
      if (r.ok) { window.location.href = '/game'; return; }
    }
    // Show Telegram button only when initDataUnsafe has user (opened via Telegram but not Mini App context)
    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
      document.getElementById('tg-login-block').style.display = '';
    }
  })();

  fetch('/api/auth/me').then(r=>r.json()).then(d=>{ if(d.player) window.location.href='/game'; });
  fetch('/api/auth/stats').then(r=>r.json()).then(d=>{
    document.getElementById('stat-total').textContent  = d.total;
    document.getElementById('stat-online').textContent = d.online;
  });

  function showTab(tab) {
    document.getElementById('login-panel').style.display    = tab==='login'    ? '' : 'none';
    document.getElementById('register-panel').style.display = tab==='register' ? '' : 'none';
    document.querySelectorAll('.auth-tab').forEach((el,i)=>{
      el.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    const r = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d = await r.json();
    if(d.success) window.location.href='/game'; else err.textContent=d.error;
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const faction  = document.querySelector('input[name="faction"]:checked')?.value;
    const gender   = document.querySelector('input[name="gender"]:checked')?.value;
    const err = document.getElementById('reg-error');
    err.textContent = '';
    if(!faction){err.textContent='Виберіть фракцію';return;}
    if(!gender) {err.textContent='Виберіть стать';return;}
    const r = await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,faction,gender})});
    const d = await r.json();
    if(d.success) window.location.href='/game'; else err.textContent=d.error;
  }

  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const loginVisible = document.getElementById('login-panel').style.display!=='none';
      if(loginVisible) doLogin(); else doRegister();
    }
  });

  async function doTelegramLogin() {
    const btn = document.getElementById('tg-login-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Підключення...';
    const initData = window.Telegram?.WebApp?.initData;
    if (!initData) { btn.textContent = '❌ Помилка: немає даних Telegram'; return; }
    const r = await fetch('/api/auth/telegram-webapp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData })
    });
    const d = await r.json();
    if (d.success) window.location.href = '/game';
    else { btn.disabled = false; btn.innerHTML = '<span style="font-size:18px">✈️</span> Увійти через Telegram'; alert(d.error); }
  }
</script>
</body>
</html>
